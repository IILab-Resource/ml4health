.children.collapsed { display: none; }
.highlight { background: #ffeb3b; border-radius: 3px; padding: 1px 3px; }
.match-info { font-size: 12px; color: #ffeb3b; margin-left: 8px; white-space: nowrap; }
.no-results { display: none; text-align: center; padding: 40px; color: #999; }
.chapter-nav { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
.chapter-nav button { padding: 5px 12px; border: 1px solid #dadce0; border-radius: 6px; background: #fff; cursor: pointer; font-size: 12px; color: #555; min-width: 32px; }
.chapter-nav button:hover { background: #f1f3f4; }

function renderNode(node, depth, path) {
  const hasChildren = node.children.length > 0;
  const isRoot = depth === 0;
  const isChapter = depth === 1;
  const isSub = depth === 2;

  let cls = 'node-text';
  if (isRoot) cls += ' root';
  else if (isChapter) cls += ' chapter';
  else if (isSub) cls += ' subchapter';

  const id = 'n-' + path.join('-');
  let html = '<div class="node" id="' + id + '" data-path="' + path.join('-') + '">';
  html += '<span class="node-label" onclick="toggleNode(this)">';
  html += '<span class="toggle' + (hasChildren ? '' : ' empty') + (depth < 2 ? ' open' : '') + '">&#9654;</span>';
  html += '<span class="' + cls + '">' + esc(node.text) + '</span>';
  html += '</span>';

  if (hasChildren) {
    html += '<div class="children' + (depth >= 2 ? ' collapsed' : '') + '">';
    node.children.forEach(function(ch, i) {
      html += renderNode(ch, depth + 1, path.concat([i]));
    });
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleNode(label) {
  const toggle = label.querySelector('.toggle');
  if (toggle.classList.contains('empty')) return;
  const children = label.parentElement.querySelector('.children');
  if (children) {
    children.classList.toggle('collapsed');
    toggle.classList.toggle('open');
  }
}

function expandAll() {
  document.querySelectorAll('.children').forEach(function(el) { el.classList.remove('collapsed'); });
  document.querySelectorAll('.toggle:not(.empty)').forEach(function(el) { el.classList.add('open'); });
}
function collapseAll() {
  document.querySelectorAll('.children').forEach(function(el) { el.classList.add('collapsed'); });
  document.querySelectorAll('.toggle:not(.empty)').forEach(function(el) { el.classList.remove('open'); });
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  document.querySelectorAll('.highlight').forEach(function(el) { el.outerHTML = el.textContent; });
  document.getElementById('matchInfo').textContent = '';
  document.getElementById('noResults').style.display = 'none';

  if (!q) {
    document.querySelectorAll('.node').forEach(function(el) { el.style.display = ''; });
    return;
  }
  let matchCount = 0;
  const matchedNodes = new Set();
  document.querySelectorAll('.node-text').forEach(function(el) {
    const text = el.textContent.toLowerCase();
    if (text.includes(q)) {
      matchCount++;
      const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
      el.innerHTML = el.textContent.replace(re, '<span class="highlight">$1</span>');
      let node = el.closest('.node');
      while (node) { matchedNodes.add(node); node = node.parentElement.closest('.node'); }
    }
  });
  if (matchCount === 0) {
    document.getElementById('noResults').style.display = 'block';
    document.querySelectorAll('.node').forEach(function(el) { el.style.display = 'none'; });
    return;
  }
  document.getElementById('matchInfo').textContent = '找到 ' + matchCount + ' 个匹配';
  document.querySelectorAll('.node').forEach(function(el) {
    el.style.display = matchedNodes.has(el) ? '' : 'none';
  });
  matchedNodes.forEach(function(node) {
    const children = node.querySelector('.children');
    if (children) children.classList.remove('collapsed');
    const toggle = node.querySelector('.toggle');
    if (toggle && !toggle.classList.contains('empty')) toggle.classList.add('open');
  });
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('matchInfo').textContent = '';
  document.getElementById('noResults').style.display = 'none';
  document.querySelectorAll('.highlight').forEach(function(el) { el.outerHTML = el.textContent; });
  document.querySelectorAll('.node').forEach(function(el) { el.style.display = ''; });
  collapseAll();
  document.querySelectorAll('.children').forEach(function(el) {
    const d = (el.closest('.node')?.id?.match(/-/g) || []).length;
    if (d < 2) el.classList.remove('collapsed');
  });
  document.querySelectorAll('.toggle:not(.empty)').forEach(function(el) {
    const d = (el.closest('.node')?.id?.match(/-/g) || []).length;
    if (d < 2) el.classList.add('open');
  });
}

(function(){
  const nav = document.getElementById('chapterNav');
  treeData.children.forEach(function(ch, i) {
    const btn = document.createElement('button');
    btn.textContent = (i + 1);
    btn.title = ch.text;
    btn.onclick = function() {
      const el = document.getElementById('n-0-' + i);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.style.background = '#e8f0fe';
        setTimeout(function() { el.style.background = ''; }, 2000);
      }
    };
    nav.appendChild(btn);
  });
})();
